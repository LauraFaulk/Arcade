<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nerd Arcade</title>
    <style>
        /* Modern Reset & Background */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5), 
            background-image: url('C:\Users\administrators1\Desktop\Randomness\arcade.jpeg') no-repeat center center fixed; 
            background-size: cover; 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin-top: 50px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00d2ff;
        }

        /* The Game Grid */
        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        /* Game Card Styling */
        .game-card {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        /* Hover Effects */
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.85);
            border-color: #00d2ff;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.7);
        }

        .game-card h2 {
            margin: 15px 0 10px;
            color: #00d2ff;
        }

        .game-card p {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #bdc3c7;
        }

        /* Button inside the card */
        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #e94560;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Nerd Arcade</h1>
        <p>Select a challenge to begin</p>
    </header>

    <div class="arcade-grid">
        
        <a href="https://laurafaulk.github.io/trivia-game/" class="game-card">
            <div style="font-size: 50px;">💡</div>
            <h2>Trivia Quiz</h2>
            <p>Multiple categories to test your general knowledge. High scores saved locally!</p>
            <span class="play-btn">Play Now</span>
        </a>

        <a href="https://laurafaulk.github.io/jeopardy-game/" class="game-card">
            <div style="font-size: 50px;">🔔</div>
            <h2>Jeopardy</h2>
            <p>The classic TV experience recreated. And this time you don't have to answer in the form of a question!</p>
            <span class="play-btn">Play Now</span>
        </a>

        </div>

</body>
</html>
