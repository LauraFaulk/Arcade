<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nerd Arcade</title>
	
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('arcade.jpeg') no-repeat center center fixed;
            background-size: cover;
	    -webkit-background-size: cover; 
    	    -moz-background-size: cover;
    	    -o-background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 60px; text-align: center; }
        h1 { 
	    font-family: 'Sour Gummy', sans-serif; 
            font-size: 8rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00d2ff; 
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.9),
                         0 0 30px rgba(0, 210, 255, 0.6);
            margin-bottom: 0;
        }

        header p {
            font-family: 'Sour Gummy', sans-serif;
            font-size: 3rem;
            color: #ff007f;
            margin-top: -10px;
	    text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
    	    font-weight: 700;
	}

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
	    padding-bottom: 50px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.7); 
    	    border: 2px solid #00d2ff;
    	    border-radius: 15px;
    	    padding: 25px;
    	    text-align: center;
    	    text-decoration: none;
    	    color: white !important;
    	    transition: 0.3s;
    	    backdrop-filter: blur(10px);	
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #ff007f;
	    color: white;
            border-radius: 8px;
	    font-family: 'Sour Gummy', sans-serif; 
    	    font-size: 1.2rem;
    	    font-weight: 700;
    	    text-transform: uppercase;
    	    letter-spacing: 1px;
    
    	    transition: 0.3s;
            
	    .play-btn:hover {
    		background: #ff007f; /* Brighter pink on hover */
    		box-shadow: 0 0 15px rgba(233, 69, 96, 0.8);
    		transform: scale(1.05); /* Makes the button slightly grow */
	    }

	@media (max-width: 600px) {
    	    h1 {
               font-size: 3.5rem;
            }
	}

	#villain-hero {
	    display: block;       /* Centers the image on its own line */
    	    margin: 10px auto;    /* Adds space above and below the image */
    	    width: 120px;         /* This makes the image a reasonable size */
    	    height: auto;         /* Keeps the image from looking squished */
    	    border-radius: 20px;  /* Softens the corners */
	    Background: none;
    	    border: none;
	    filter: drop-shadow(0 0 10px #ff007f);
	    transition: 0.3s;
    	    box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); /* A glowing effect */
	    mix-blend-mode: multiply; /* This makes white backgrounds disappear */
    	    /* OR try */
    	    /* mix-blend-mode: screen; */ /* This makes black backgrounds disappear */
	}

	#villain-hero:hover {
    	    transform: scale(1.1); /* Makes him grow slightly when moused over */
    	    filter: drop-shadow(0 0 20px #ff007f);
	}
	}

    </style>
</head>
<body>

    <header>
        <h1>The Nerd Arcade</h1>
	
	<img src="villain2.jpeg" id="villain-hero" alt="The Villain">
        <p>Choose Your Punishment!</p>
    </header>

    <div class="arcade-grid">
        <a href="https://laurafaulk.github.io/trivia-game/" class="game-card" target="_blank">
            <div style="font-size: 50px;">💡</div>
            <h2>Trivia Mayhem</h2>
            <p>Test your knowledge of everything good to know, or completely useless!</p>
            <div class="play-btn">Play Now</div>
        </a>

        <a href="https://laurafaulk.github.io/jeopardy-game/" class="game-card" target="_blank">
            <div style="font-size: 50px;">🔔</div>
            <h2>Jeopardy</h2>
            <p>The classic quiz game; but you don't have to answer in the form of a question!</p>
            <div class="play-btn">Play Now</div>
        </a>
    </div>

</body>
</html>
