<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nerd Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('arcade.jpeg') no-repeat center center fixed;
            background-size: cover;
	    -webkit-background-size: cover; 
    	    -moz-background-size: cover;
    	    -o-background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #00d2ff; text-transform: uppercase; }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.7); 
    	    border: 2px solid #00d2ff;
    	    border-radius: 15px;
    	    padding: 25px;
    	    text-align: center;
    	    text-decoration: none;
    	    color: white !important;
    	    transition: 0.3s;
    	    backdrop-filter: blur(5px);	
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 210, 255, 0.1);
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #e94560;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Nerd Arcade</h1>
        <p>Choose Your Punishment! 🦹🏻‍♀️</p>
    </header>

    <div class="arcade-grid">
        <a href="https://laurafaulk.github.io/trivia-game/" class="game-card" target="_blank">
            <div style="font-size: 50px;">💡</div>
            <h2>Trivia Mayhem</h2>
            <p>Test your knowledge of everything good to know, or completely useless!</p>
            <div class="play-btn">Play Now</div>
        </a>

        <a href="https://laurafaulk.github.io/jeopardy-game/" class="game-card" target="_blank">
            <div style="font-size: 50px;">🔔</div>
            <h2>Jeopardy</h2>
            <p>The classic quiz game; but you don't have to answer in the form of a question!</p>
            <div class="play-btn">Play Now</div>
        </a>
    </div>

</body>
</html>
