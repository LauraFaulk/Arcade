<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nerd Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            /* Using a fallback color (dark blue) in case the image fails */
            background: #16213e; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; text-shadow: 0 0 10px #00d2ff; text-transform: uppercase; }

        .arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(0, 0, 0, 0.8); /* Solid dark background so it's visible */
            border: 2px solid #00d2ff;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: white !important;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(0, 210, 255, 0.1);
        }

        .play-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #e94560;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>The Nerd Arcade</h1>
        <p>Select a game to play</p>
    </header>

    <div class="arcade-grid">
        <a href="https://laurafaulk.github.io/trivia-repo/" class="game-card">
            <div style="font-size: 50px;">💡</div>
            <h2>Trivia Quiz</h2>
            <p>Test your knowledge!</p>
            <div class="play-btn">Play Now</div>
        </a>

        <a href="https://laurafaulk.github.io/jeopardy-repo/" class="game-card">
            <div style="font-size: 50px;">🔔</div>
            <h2>Jeopardy</h2>
            <p>The classic quiz game.</p>
            <div class="play-btn">Play Now</div>
        </a>
    </div>

</body>
</html>
