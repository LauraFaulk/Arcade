<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Game Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .container { margin-top: 50px; }
        .card-container { display: flex; justify-content: center; gap: 20px; }
        .game-card { 
            padding: 20px; border: 1px solid #ccc; border-radius: 8px; 
            background: white; width: 200px; text-decoration: none; color: black;
        }
        .game-card:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <h1>Welcome to My Arcade</h1>
    <div class="card-container">
        <a class="game-card" href="https://yourusername.github.io/trivia-repo/">
            <h3>Trivia Game</h3>
            <p>Test your knowledge!</p>
        </a>
        <a class="game-card" href="https://yourusername.github.io/jeopardy-repo/">
            <h3>Jeopardy</h3>
            <p>The classic quiz game.</p>
        </a>
    </div>
</body>
</html>
